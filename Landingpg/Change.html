            .sidenav {

       <script> 

        function playStation(){
          mySound = new sound("maxkomusic-space-heroes.mp3");
          mySound.play();
       }
       function StopStation(){
         mySound = new sound("maxkomusic-space-heroes.mp3");
         mySound.stop();
       }
        function sound(srcFile){
          this.sound = document.createElement("audio");
          this.sound.src = srcFile;
          this.sound.setAttribute("preload","audio");
          this.sound.setAttribute("contorls","none");
          this.sound.style.display="none";
          document.body.appendChild(this.sound);
        this.stop=function(){
            this.sound.pause();
        }  
        this.play=function(){
              this.sound.play();
          }
        
        
    }

       function CountDown(){
        StopStation();
        playStation();
       
        var currTime = 55
        var timeDown = setInterval(function() {
            currTime = currTime - 5;
            document.getElementById("timer").innerHTML = "The time is: " + currTime;
            if(currTime == 0){
                clearInterval(timeDown);
               document.getElementById("timer").innerHTML = "BLASTOFF!!!!";
            }else if(currTime < 25){
            document.getElementById("timer").innerHTML = "Warning Less than half way to launch, time left " + currTime;               
            } 
         }, 5000);
    };</script>
    
    </head>
